name: "SecOps & FinOps: Automated Code Guard"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pull-requests: write

jobs:
  infrastructure_audit:
    name: "Security and Cost Compliance Scan"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Initialize Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Evaluate IaC Security Policies
        uses: bridgecrewio/checkov-action@master
        with:
          config_file: .checkov.yaml

      # Installs Infracost using your stored secret token
      - name: Setup Infracost CLI
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      # NORMAL STEP: Generates JSON data AND prints the cost table directly to your logs
      - name: Calculate and Print Cost Breakdown
        run: |
          infracost breakdown --path . \
                              --format json \
                              --out-file /tmp/infracost.json
          
          # This forces Infracost to output the raw text table inside your GitHub Action logs
          infracost breakdown --path .

      # NORMAL STEP: Posts comment to PR (Will skip safely on direct pushes without breaking)
      - name: Post Cost Estimate to Pull Request
        run: |
          infracost comment github --path /tmp/infracost.json \
                                   --repo $GITHUB_REPOSITORY \
                                   --github-token ${{ github.token }} \
                                   --pull-request ${{ github.event.pull_request.number }} \
                                   --behavior update

