name: "SecOps & FinOps: Automated Code Guard"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  infrastructure_audit:
    name: "Security and Cost Compliance Scan"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Initialize Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Evaluate IaC Security Policies
        uses: bridgecrewio/checkov-action@master
        with:
          config_file: .checkov.yaml

      - name: Setup Infracost CLI
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Calculate and Print Cost Breakdown
        run: |
          infracost breakdown --path . \
                              --format json \
                              --out-file /tmp/infracost.json
          
          infracost breakdown --path .

      # NO IF CONDITION: Targets the specific commit hash instead of a PR number
      - name: Post Cost Estimate to GitHub Commit
        run: |
          infracost comment github --path /tmp/infracost.json \
                                   --repo $GITHUB_REPOSITORY \
                                   --github-token ${{ github.token }} \
                                   --commit ${{ github.sha }} \
                                   --behavior update

