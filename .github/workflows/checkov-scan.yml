name: "SecOps & FinOps: Automated Code Guard"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Granting strict permissions for both commit hash tracking and PR comments
permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  infrastructure_audit:
    name: "Security and Cost Compliance Scan"
    runs-on: ubuntu-latest

    steps:
      # Step 1: Clone the codebase onto the runner
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Step 2: Initialize secure Python environment
      - name: Initialize Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Step 3: Run Checkov Security Scan against your custom rules baseline
      - name: Evaluate IaC Security Policies
        uses: bridgecrewio/checkov-action@master
        with:
          config_file: .checkov.yaml

      # Step 4: Install and set up the Infracost engine
      - name: Setup Infracost CLI
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      # Step 5: Generate output data structure and print the baseline cost summary table to logs
      - name: Calculate and Print Cost Breakdown
        run: |
          infracost breakdown --path . \
                              --format json \
                              --out-file /tmp/infracost.json
          
          infracost breakdown --path .

      # Step 6: Post cost table comment to the explicit commit hash (No if-condition used)
      - name: Calculate and Print Cost Breakdown
        run: |
          infracost breakdown --path . \
                              --format json \
                              --out-file /tmp/infracost.json
          
          # This line prints the raw JSON output file directly to your GitHub Action logs!
          cat /tmp/infracost.json
          
          # Keep this so your text table still prints to logs too
          infracost breakdown --path .

